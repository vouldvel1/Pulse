port: 7880
rtc:
  tcp_port: 7881
  udp_port: 7882
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: false
turn:
  enabled: true
  domain: __LIVEKIT_TURN_DOMAIN__
  # UDP TURN on a dedicated port — no TLS cert required
  udp_port: 3478
# API key/secret pairs.  The entrypoint substitutes values from the environment.
# Key name must match LIVEKIT_API_KEY; value must match LIVEKIT_API_SECRET.
keys:
  __LIVEKIT_API_KEY__: __LIVEKIT_API_SECRET__
logging:
  level: info
