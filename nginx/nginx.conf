worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    # Note: image/svg+xml intentionally omitted (SVG uploads are disallowed)
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Return 429 (Too Many Requests) instead of the default 503 for rate-limited
    # requests so clients can distinguish rate limiting from server errors.
    limit_req_status 429;
    limit_req_log_level warn;

    # Upstream definitions
    upstream api_backend {
        server api:8080;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:80;
    }

    # Map for WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------------------------------------------------------------------------
    # HTTP — redirect all traffic to HTTPS
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Allow the health check to work over plain HTTP (used by Docker
        # healthcheck and load balancer probes before TLS is configured).
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # TLS certificates.
        # For local dev generate a self-signed cert:
        #   mkdir -p nginx/certs
        #   openssl req -x509 -newkey rsa:4096 -keyout nginx/certs/key.pem \
        #     -out nginx/certs/cert.pem -days 365 -nodes -subj '/CN=localhost'
        # For production use Let's Encrypt / your CA and replace these paths.
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Modern TLS settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers applied to ALL responses (including proxied ones) via
        # the `always` flag.  Without `always`, add_header only fires on 2xx/3xx.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Basic CSP — tighten for production by listing exact script/style origins.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; media-src 'self' blob:; worker-src blob:;" always;

        # Health check endpoint (also reachable over HTTPS)
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Auth endpoints — stricter rate limit (applied before the /api/ block
        # because nginx uses longest-prefix matching, so /api/auth/ wins)
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # REST API
        location /api/ {
            limit_req zone=api burst=120 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # WebSocket
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # MinIO storage proxy — serves uploaded files.
        # Access is implicitly controlled by the MinIO bucket policy (public-read).
        # The rewrite strips the /storage/ prefix before forwarding to MinIO.
        location /storage/ {
            # Only allow GET and HEAD to prevent using this proxy as a write path.
            limit_except GET HEAD {
                deny all;
            }

            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://minio:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ensure uploaded files are downloaded rather than rendered inline
            # when the browser does not recognise the MIME type.
            add_header X-Content-Type-Options "nosniff" always;

            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Frontend (SPA)
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
