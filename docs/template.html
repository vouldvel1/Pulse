<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse (beta)</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <style>
        :root {
            --primary: #D0BCFF;
            --on-primary: #381E72;
            --primary-container: rgba(79, 55, 139, 0.4);
            --surface: rgba(28, 27, 33, 0.7);
            --surface-variant: rgba(73, 69, 79, 0.5);
            --bg-base: #0F0D13;
            --outline: #938F99;
            --error: #F2B8B5;
            --radius-xl: 32px;
            --glass-blur: 25px;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Google Sans', sans-serif; background: var(--bg-base); color: #E6E1E5; overflow: hidden; }
        .icon { font-family: 'Material Symbols Rounded'; font-size: 20px; user-select: none; }

        /* --- NAVIGATION --- */
        .top-nav { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: relative; z-index: 1100; }
        .nav-island { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); }
        .nav-btn { width: 44px; height: 44px; border-radius: 14px; border: none; background: transparent; color: var(--outline); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn.active { background: var(--primary); color: var(--on-primary); }
        .brand-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; font-size: 24px; pointer-events: none; }

        /* --- MAIN LAYOUT --- */
        .main-container { display: flex; height: calc(100vh - 72px); padding: 0 12px 12px; gap: 12px; }
        .glass-panel { background: var(--surface); backdrop-filter: blur(var(--glass-blur)); border-radius: var(--radius-xl); border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .sidebar-left { width: 280px; }
        .chat-view { flex: 1; }
        .sidebar-right { width: 260px; }

        /* --- SIDEBAR CONTENT --- */
        .scroll-area { flex: 1; overflow-y: auto; padding-top: 12px; }
        .section-label { font-size: 10px; color: var(--outline); font-weight: 700; margin: 16px 16px 8px; text-transform: uppercase; letter-spacing: 1px; }
        .item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 16px; cursor: pointer; font-size: 14px; color: var(--outline); margin: 2px 8px; position: relative; }
        .item:hover { background: rgba(255,255,255,0.05); color: white; }
        .item.active { background: var(--primary-container); color: var(--primary); }
        .item.accent { background: var(--primary); color: var(--on-primary); font-weight: 700; margin-bottom: 12px; }

        /* --- VOICE MINI PANEL --- */
        .voice-card { background: var(--surface-variant); margin: 8px; border-radius: 24px; padding: 12px; display: none; animation: slideUp 0.4s ease; border: 1px solid rgba(255,255,255,0.1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .voice-status { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .voice-actions { display: flex; gap: 6px; justify-content: center; }
        .v-btn-sm { width: 36px; height: 36px; border-radius: 12px; background: rgba(255,255,255,0.08); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .v-btn-sm.hangup { background: var(--error); color: #601410; }

        /* --- VOICE OVERLAY --- */
        .voice-overlay { position: absolute; inset: 0; background: var(--bg-base); z-index: 1000; display: none; flex-direction: column; padding: 40px; }
        .v-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; flex: 1; align-content: center; }
        .v-box { aspect-ratio: 16/10; background: var(--surface-variant); border-radius: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid transparent; position: relative; }
        .v-box.speaking { border-color: var(--primary); box-shadow: 0 0 20px rgba(208, 188, 255, 0.2); }
        .v-controls-float { display: flex; gap: 16px; background: var(--surface); padding: 12px 24px; border-radius: 24px; align-self: center; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .v-btn-lg { width: 52px; height: 52px; border-radius: 16px; border: none; background: rgba(255,255,255,0.05); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* --- RIGHT SIDEBAR: COMMUNITY --- */
        .banner { height: 100px; background: linear-gradient(135deg, var(--on-primary), var(--primary)); opacity: 0.8; }
        .comm-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* --- USER BAR --- */
        .user-bar { background: rgba(255,255,255,0.05); padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; border-radius: 20px; margin: 8px; }

        /* --- CTX MENU --- */
        .ctx-menu { position: fixed; background: #232229; border-radius: 16px; padding: 8px; width: 220px; display: none; z-index: 5000; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .ctx-item { padding: 10px 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; }
        .ctx-item:hover { background: var(--primary-container); color: var(--primary); }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { width: 380px; background: #1C1B21; border-radius: 32px; padding: 24px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-island">
            <button class="nav-btn" onclick="uiDM()" id="nav-dm"><span class="icon">person</span></button>
            <button class="nav-btn active" onclick="uiSrv()" id="nav-srv"><span class="icon">grid_view</span></button>
            <button class="nav-btn"><span class="icon">add</span></button>
        </div>
        <div class="brand-center"><span class="icon" style="font-size:28px;">bolt</span>pulse (beta)</div>
        <button class="nav-btn" style="background:rgba(255,255,255,0.05); border-radius:50%" onclick="toggleModal(true)"><span class="icon">palette</span></button>
    </nav>

    <div class="main-container">
        <aside class="sidebar-left glass-panel">
            <div class="scroll-area" id="left-nav"></div>
            
            <div class="voice-card" id="voice-mini">
                <div class="voice-status">
                    <div>
                        <div style="color:#81C784; font-size:12px; font-weight:700; display:flex; align-items:center; gap:4px;">
                            <span class="icon" style="font-size:14px;">sensors</span> В эфире
                        </div>
                        <div style="font-size:11px; opacity:0.6;">Общий канал / Pulse</div>
                    </div>
                    <button class="v-btn-sm" onclick="toggleOverlay(true)"><span class="icon">open_in_full</span></button>
                </div>
                <div class="voice-actions">
                    <button class="v-btn-sm"><span class="icon">videocam</span></button>
                    <button class="v-btn-sm"><span class="icon">screen_share</span></button>
                    <button class="v-btn-sm"><span class="icon">mic</span></button>
                    <button class="v-btn-sm hangup" onclick="leaveVoice()"><span class="icon">call_end</span></button>
                </div>
            </div>

            <div class="user-bar">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:32px; height:32px; background:var(--primary); border-radius:10px;"></div>
                    <span style="font-size:12px; font-weight:700;">Python4k</span>
                </div>
                <div style="display:flex; gap:4px;">
                    <div class="nav-btn" style="width:32px; height:32px;"><span class="icon" style="font-size:18px;">settings</span></div>
                </div>
            </div>
        </aside>

        <main class="chat-view glass-panel">
            <div class="voice-overlay" id="v-overlay">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                    <h2 style="margin:0;">Общий канал</h2>
                    <button class="v-btn-sm" onclick="toggleOverlay(false)" style="width:44px; height:44px;"><span class="icon">close_fullscreen</span></button>
                </div>
                <div class="v-grid">
                    <div class="v-box speaking">
                        <div style="width:80px; height:80px; background:var(--primary); border-radius:50%"></div>
                        <div style="position:absolute; bottom:15px; left:20px; font-size:12px; background:rgba(0,0,0,0.5); padding:4px 10px; border-radius:8px;">Python4k</div>
                    </div>
                    <div class="v-box">
                        <div style="width:80px; height:80px; background:rgba(255,255,255,0.1); border-radius:50%"></div>
                        <div style="position:absolute; bottom:15px; left:20px; font-size:12px; background:rgba(0,0,0,0.5); padding:4px 10px; border-radius:8px;">Alexander</div>
                    </div>
                </div>
                <div class="v-controls-float">
                    <button class="v-btn-lg"><span class="icon">videocam</span></button>
                    <button class="v-btn-lg"><span class="icon">screen_share</span></button>
                    <button class="v-btn-lg"><span class="icon">mic</span></button>
                    <button class="v-btn-lg" style="background:var(--error); color:#601410;" onclick="leaveVoice()"><span class="icon">call_end</span></button>
                </div>
            </div>

            <div style="padding:18px 24px; border-bottom:1px solid rgba(255,255,255,0.05); font-weight:700;" id="chat-title"># основной</div>
            <div style="flex:1; display:flex; align-items:center; justify-content:center; opacity:0.05;"><span class="icon" style="font-size:140px;">waves</span></div>
            <div style="margin:16px; background:rgba(0,0,0,0.2); border-radius:24px; padding:14px 20px;"><input type="text" placeholder="Написать..." style="width:100%; background:transparent; border:none; outline:none; color:white;"></div>
        </main>

        <aside class="sidebar-right glass-panel" id="right-panel">
            <div class="banner"></div>
            <div class="comm-header">
                <span style="font-weight:700; font-size:18px;">Pulse Server</span>
                <div style="font-size:11px; color:var(--outline); margin-top:6px; display:flex; align-items:center; gap:6px;">
                    <div style="width:6px; height:6px; background:#81C784; border-radius:50%"></div> 14 онлайн
                </div>
            </div>
            <div class="scroll-area">
                <div class="section-label">Администрация</div>
                <div class="item"><div style="width:32px; height:32px; background:var(--primary); border-radius:10px;"></div> Python4k</div>
                <div class="section-label">Участники</div>
                <div class="item"><div style="width:32px; height:32px; background:rgba(255,255,255,0.1); border-radius:10px;"></div> Alexander</div>
            </div>
        </aside>
    </div>

    <div class="ctx-menu" id="user-ctx">
        <div style="padding:8px 12px; font-size:10px; font-weight:700; color:var(--outline)">ГРОМКОСТЬ</div>
        <div style="padding:0 12px 12px;"><input type="range" style="width:100%; accent-color:var(--primary);"></div>
        <div class="ctx-item"><span class="icon">person</span> Профиль</div>
        <div class="ctx-item" style="color:#FFB4AB"><span class="icon">volume_off</span> Заглушить</div>
    </div>

    <div class="modal" id="modal-theme" onclick="toggleModal(false)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3>Внешний вид</h3>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; margin:20px 0;">
                <div style="background:#D0BCFF; aspect-ratio:1; border-radius:12px; cursor:pointer;" onclick="setT('#D0BCFF','#381E72')"></div>
                <div style="background:#B4E197; aspect-ratio:1; border-radius:12px; cursor:pointer;" onclick="setT('#B4E197','#25361A')"></div>
                <div style="background:#A1CFFF; aspect-ratio:1; border-radius:12px; cursor:pointer;" onclick="setT('#A1CFFF','#003355')"></div>
            </div>
            <button class="item" style="background:var(--primary); color:var(--on-primary); width:100%; justify-content:center;" onclick="toggleModal(false)">Применить</button>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('user-ctx');
        const vMini = document.getElementById('voice-mini');
        const vOver = document.getElementById('v-overlay');

        function toggleModal(s) { document.getElementById('modal-theme').style.display = s ? 'flex' : 'none'; }
        function setT(p, op) { document.documentElement.style.setProperty('--primary', p); document.documentElement.style.setProperty('--on-primary', op); }

        function joinVoice() {
            vMini.style.display = 'block';
            document.getElementById('v-list').innerHTML = `<div class="item" oncontextmenu="showCtx(event)" style="font-size:13px;"><div style="width:18px; height:18px; background:var(--primary); border-radius:4px;"></div> Python4k</div>`;
        }
        function leaveVoice() { vMini.style.display = 'none'; vOver.style.display = 'none'; document.getElementById('v-list').innerHTML = ''; }
        function toggleOverlay(s) { vOver.style.display = s ? 'flex' : 'none'; }

        function showCtx(e) {
            e.preventDefault(); e.stopPropagation();
            ctx.style.display = 'block'; ctx.style.top = e.clientY + 'px'; ctx.style.left = e.clientX + 'px';
        }
        document.addEventListener('click', () => ctx.style.display = 'none');

        function uiDM() {
            document.getElementById('nav-dm').classList.add('active');
            document.getElementById('nav-srv').classList.remove('active');
            document.getElementById('left-nav').innerHTML = `<div class="item accent"><span class="icon">person_add</span> Добавить друга</div><div class="section-label">Сообщения</div><div class="item active"><span class="icon">account_circle</span> Alexander</div>`;
            document.getElementById('right-panel').style.display = 'none';
        }

        function uiSrv() {
            document.getElementById('nav-dm').classList.remove('active');
            document.getElementById('nav-srv').classList.add('active');
            document.getElementById('left-nav').innerHTML = `
                <div class="section-label">Каналы</div>
                <div class="item active"><span class="icon">tag</span> основной</div>
                <div class="section-label">Голос</div>
                <div class="item" onclick="joinVoice()"><span class="icon">volume_up</span> Общий</div>
                <div id="v-list" style="padding-left:32px;"></div>
            `;
            document.getElementById('right-panel').style.display = 'flex';
        }
        uiSrv();
    </script>
</body>
</html>
