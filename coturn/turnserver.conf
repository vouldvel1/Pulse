# Coturn TURN/STUN server configuration for Pulse

# Listener ports
listening-port=3478
tls-listening-port=5349

# Relay port range
min-port=49152
max-port=49252

# Use fingerprint in TURN messages
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Realm
realm=pulse.local

# Ephemeral auth secret (shared with API server via TURN_SECRET env var)
# IMPORTANT: This MUST match the TURN_SECRET in .env exactly
use-auth-secret
static-auth-secret=FsXGO2RIU-P3S_xQ9

# Logging
log-file=stdout
verbose

# Disable CLI
no-cli

# Disable TLS for now (enable in production with certs)
# cert=/etc/ssl/certs/turn_server_cert.pem
# pkey=/etc/ssl/private/turn_server_pkey.pem

# External IP: This tells coturn what IP to advertise in relay candidates.
# Without this, relay candidates contain Docker-internal IPs (172.x.x.x)
# which are unreachable from the browser on the host machine.
# For local dev: 127.0.0.1 (host loopback, reachable from browser)
# For production: set to your server's public IP
external-ip=127.0.0.1

# Deny relay to public internet abuse, but allow Docker-internal IPs
# Note: Docker networking uses 172.x.x.x ranges, so we must NOT block those.
# In production, tighten these rules to your specific network topology.
no-multicast-peers

# Total allocation quota
total-quota=100

# Max bytes-per-second per session (0 = unlimited)
max-bps=0

# Stale nonce lifetime
stale-nonce=600
